disk = "/dev/vda"
hostname = "dali-test"
timezone = "Europe/Paris"
locale = "en_US.UTF-8"
keymap = "fr"
root_password = ""
github_user = "davlgd"
# sshd password authentication. Omit to auto-decide (off when github_user keys
# are imported, on otherwise); set explicitly to force it.
# ssh_password_auth = false
extra_packages = ["neovim"]
zram_swap = true
default_apps = true
# Resolvers used inside the chroot (NetworkManager takes over after first boot).
# Defaults to Quad9 + Cloudflare; set to [] to keep what pacstrap copied.
dns_servers = ["9.9.9.9", "1.1.1.1"]
# custom_commands run as your user in the target at the end of provisioning:
# custom_commands = ["git config --global pull.rebase true"]

# Post-install provisioning (best-effort, network-bound). Omit a key to keep it
# on; set enabled = false to skip provisioning entirely.
[provision]
enabled = true
v = true      # build the V compiler from source
tools = true  # mise + its global tool set + Claude Code (AI/dev CLIs)

# Shell environment.
[shell]
aliases = true  # write the DALI alias/helper block into ~/.bashrc

[user]
username = "david"
password = "changeme"
